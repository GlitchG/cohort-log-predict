name: CI Tests

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '3.11'}
      - run: pip install -r requirements.txt
      - run: python -c "from python.cohort_log_predict import CohortLogPredictor; c=CohortLogPredictor(0.45,0.18); assert 0<c.predict(30)<1; print('✅ Tests passed')"
